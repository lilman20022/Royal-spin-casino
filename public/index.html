<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Spin Casino - 3D Gaming Experience</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', 'Arial', sans-serif; background: #0a0e27; color: #fff; overflow: hidden; height: 100vh; }
        #canvas { display: block; width: 100%; height: 100%; }
        .ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .header { position: fixed; top: 0; left: 0; right: 0; padding: 20px 40px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); z-index: 101; pointer-events: auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 32px; font-weight: bold; background: linear-gradient(45deg, #ffd700, #ffed4e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .wallet { background: rgba(0, 212, 255, 0.1); padding: 12px 24px; border-radius: 8px; border: 2px solid #00d4ff; backdrop-filter: blur(10px); pointer-events: auto; }
        .balance { font-size: 18px; color: #00d4ff; }
        .balance-amount { font-size: 24px; color: #ffd700; font-weight: bold; }
        .controls { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 101; pointer-events: auto; }
        .btn { padding: 12px 30px; font-size: 16px; font-weight: bold; border: 2px solid #ffd700; background: linear-gradient(45deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05)); color: #ffd700; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; backdrop-filter: blur(10px); }
        .btn:hover { background: linear-gradient(45deg, rgba(255, 215, 0, 0.4), rgba(255, 215, 0, 0.2)); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn-spin { padding: 15px 40px; font-size: 18px; background: linear-gradient(45deg, #00d4ff, #0099cc); border-color: #00d4ff; color: #fff; }
        .btn-spin:hover { box-shadow: 0 0 30px rgba(0, 212, 255, 0.8); }
        .game-info { position: fixed; top: 100px; right: 40px; background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 8px; border: 2px solid #00d4ff; max-width: 300px; z-index: 101; pointer-events: auto; backdrop-filter: blur(10px); }
        .game-title { font-size: 20px; color: #ffd700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .game-stats { font-size: 14px; color: #00d4ff; line-height: 1.8; }
        .stat-label { color: #aaa; }
        .stat-value { color: #ffd700; font-weight: bold; }
        .result-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); padding: 40px; border-radius: 12px; border: 3px solid #ffd700; text-align: center; z-index: 102; pointer-events: auto; backdrop-filter: blur(10px); display: none; min-width: 400px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); }
        .result-overlay.show { display: block; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .result-title { font-size: 36px; color: #ffd700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .result-amount { font-size: 48px; color: #00d4ff; margin-bottom: 20px; font-weight: bold; }
        .result-symbols { font-size: 32px; margin-bottom: 20px; letter-spacing: 10px; }
        .close-result { margin-top: 20px; padding: 10px 20px; background: #ffd700; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .close-result:hover { background: #ffed4e; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="ui">
        <div class="header">
            <div class="logo">🎰 ROYAL SPIN CASINO</div>
            <div class="wallet">
                <span class="balance">Balance:</span>
                <span class="balance-amount" id="balance">$5,000.00</span>
            </div>
        </div>
        <div class="game-info">
            <div class="game-title" id="gameName">Buffalo Gold</div>
            <div class="game-stats">
                <div><span class="stat-label">RTP:</span> <span class="stat-value" id="rtp">95.5%</span></div>
                <div><span class="stat-label">Bet:</span> <span class="stat-value" id="bet">$10.00</span></div>
                <div><span class="stat-label">Status:</span> <span class="stat-value" id="status">Ready</span></div>
            </div>
        </div>
        <div class="controls">
            <button class="btn" id="betDown">- Bet</button>
            <button class="btn" id="betUp">+ Bet</button>
            <button class="btn btn-spin" id="spinBtn">SPIN</button>
            <button class="btn" id="maxBet">Max Bet</button>
        </div>
        <div class="result-overlay" id="resultOverlay">
            <div class="result-title" id="resultTitle">YOU WIN!</div>
            <div class="result-symbols" id="resultSymbols">🦬 🦬 🦬</div>
            <div class="result-amount" id="resultAmount">+$500</div>
            <button class="close-result" onclick="closeResult()">Continue</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const gameState = {
            balance: 5000,
            currentBet: 10,
            minBet: 1,
            maxBet: 1000,
            isSpinning: false,
            currentGame: 'Buffalo Gold',
            rtp: 95.5,
            symbols: ['🦬', '🌾', '⭐', '💎', '🏆', '🎯'],
        };

        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0e27, 1);
        renderer.shadowMap.enabled = true;

        camera.position.z = 5;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00d4ff, 1);
        pointLight.position.set(5, 5, 5);
        pointLight.castShadow = true;
        scene.add(pointLight);

        const pointLight2 = new THREE.PointLight(0xffd700, 0.8);
        pointLight2.position.set(-5, -5, 5);
        scene.add(pointLight2);

        function createSlotMachine() {
            const group = new THREE.Group();

            const cabinetGeometry = new THREE.BoxGeometry(3, 4, 0.5);
            const cabinetMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.8,
                roughness: 0.2
            });
            const cabinet = new THREE.Mesh(cabinetGeometry, cabinetMaterial);
            cabinet.castShadow = true;
            cabinet.receiveShadow = true;
            group.add(cabinet);

            const reels = [];
            const reelPositions = [-1.2, 0, 1.2];

            reelPositions.forEach((x, index) => {
                const reel = createReel(index);
                reel.position.x = x;
                reel.position.y = 0.5;
                group.add(reel);
                reels.push(reel);
            });

            group.reels = reels;
            return group;
        }

        function createReel(index) {
            const group = new THREE.Group();

            const reelGeometry = new THREE.BoxGeometry(0.8, 2.5, 0.3);
            const reelMaterial = new THREE.MeshStandardMaterial({
                color: 0x2a2a4e,
                metalness: 0.6,
                roughness: 0.4
            });
            const reelBg = new THREE.Mesh(reelGeometry, reelMaterial);
            reelBg.castShadow = true;
            reelBg.receiveShadow = true;
            group.add(reelBg);

            const frameGeometry = new THREE.BoxGeometry(0.9, 2.6, 0.05);
            const frameMaterial = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                metalness: 0.9,
                roughness: 0.1
            });
            const frame = new THREE.Mesh(frameGeometry, frameMaterial);
            frame.position.z = 0.2;
            frame.castShadow = true;
            group.add(frame);

            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 768;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 256, 768);

            gameState.symbols.forEach((symbol, i) => {
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 80px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(symbol, 128, 128 + i * 128);
            });

            const texture = new THREE.CanvasTexture(canvas);
            const symbolMaterial = new THREE.MeshStandardMaterial({
                map: texture,
                metalness: 0.3,
                roughness: 0.7
            });
            const symbolMesh = new THREE.Mesh(reelGeometry, symbolMaterial);
            symbolMesh.position.z = 0.15;
            group.add(symbolMesh);

            group.symbolMesh = symbolMesh;
            group.currentRotation = 0;
            return group;
        }

        const slotMachine = createSlotMachine();
        scene.add(slotMachine);

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.05,
                sizeAttenuation: true
            });

            const starsVertices = [];
            for (let i = 0; i < 1000; i++) {
                const x = (Math.random() - 0.5) * 100;
                const y = (Math.random() - 0.5) * 100;
                const z = (Math.random() - 0.5) * 100;
                starsVertices.push(x, y, z);
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsVertices), 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        createStars();

        function updateUI() {
            document.getElementById('balance').textContent = '$' + gameState.balance.toFixed(2);
            document.getElementById('bet').textContent = '$' + gameState.currentBet.toFixed(2);
            document.getElementById('gameName').textContent = gameState.currentGame;
            document.getElementById('rtp').textContent = gameState.rtp + '%';
        }

        async function spin() {
            if (gameState.isSpinning || gameState.balance < gameState.currentBet) return;

            gameState.isSpinning = true;
            gameState.balance -= gameState.currentBet;
            document.getElementById('status').textContent = 'Spinning...';
            document.getElementById('spinBtn').disabled = true;

            const spinPromises = slotMachine.reels.map((reel, index) => {
                return new Promise(resolve => {
                    const rotations = 5 + Math.random() * 3;
                    gsap.to(reel, {
                        rotation: rotations * Math.PI * 2,
                        duration: 2 + index * 0.3,
                        ease: 'power2.inOut',
                        onComplete: resolve
                    });
                });
            });

            await Promise.all(spinPromises);

            const result = gameState.symbols.map(() => gameState.symbols[Math.floor(Math.random() * gameState.symbols.length)]);
            const isWin = result[0] === result[1] && result[1] === result[2];
            let winAmount = 0;

            if (isWin) {
                winAmount = gameState.currentBet * (50 + Math.random() * 100);
                gameState.balance += winAmount;
                showResult(true, result, winAmount);
            } else {
                showResult(false, result, 0);
            }

            gameState.isSpinning = false;
            document.getElementById('status').textContent = 'Ready';
            document.getElementById('spinBtn').disabled = false;
            updateUI();
        }

        function showResult(isWin, symbols, amount) {
            const overlay = document.getElementById('resultOverlay');
            document.getElementById('resultTitle').textContent = isWin ? '🎉 YOU WIN! 🎉' : 'NO MATCH';
            document.getElementById('resultSymbols').textContent = symbols.join(' ');
            document.getElementById('resultAmount').textContent = isWin ? '+$' + amount.toFixed(2) : '-$' + gameState.currentBet.toFixed(2);
            overlay.classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
        }

        document.getElementById('spinBtn').addEventListener('click', spin);
        document.getElementById('betUp').addEventListener('click', () => {
            gameState.currentBet = Math.min(gameState.currentBet + 10, gameState.maxBet);
            updateUI();
        });
        document.getElementById('betDown').addEventListener('click', () => {
            gameState.currentBet = Math.max(gameState.currentBet - 10, gameState.minBet);
            updateUI();
        });
        document.getElementById('maxBet').addEventListener('click', () => {
            gameState.currentBet = Math.min(gameState.maxBet, gameState.balance);
            updateUI();
        });

        function animate() {
            requestAnimationFrame(animate);
            slotMachine.rotation.y += 0.0005;
            pointLight.position.x = Math.sin(Date.now() * 0.001) * 5;
            pointLight.position.y = Math.cos(Date.now() * 0.0008) * 5;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateUI();
    </script>
</body>
</html>
