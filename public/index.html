<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Spin Casino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: Arial, sans-serif; }
        body { 
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ffd700;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 2px;
        }
        
        .balance {
            font-size: 18px;
            color: #00d4ff;
            font-weight: bold;
        }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
        }
        
        .left-sidebar {
            width: 150px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .game-btn {
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            transition: all 0.3s;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .game-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }
        
        .game-btn.active {
            background: #ffd700;
            color: #000;
            border-color: #ffd700;
        }
        
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .game-info {
            background: rgba(0, 212, 255, 0.1);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 12px;
            display: flex;
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            gap: 5px;
        }
        
        .info-label {
            color: rgba(0, 212, 255, 0.6);
            font-weight: bold;
        }
        
        .info-value {
            color: #ffd700;
        }
        
        #gameContainer {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        
        .reels-display {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }
        
        .reel {
            background: linear-gradient(135deg, #1a1a3e 0%, #2a2a5e 100%);
            border: 3px solid #ffd700;
            border-radius: 8px;
            padding: 15px;
            min-width: 100px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 40px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 10px rgba(255, 215, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .reel.spinning {
            animation: spinReel 0.6s linear infinite;
        }
        
        @keyframes spinReel {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        
        .reel-symbol {
            transition: all 0.3s;
        }
        
        .controls {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-top: 2px solid #ffd700;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid rgba(255, 215, 0, 0.4);
            color: #ffd700;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .spin-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: 2px solid #00d4ff;
            color: #fff;
            font-size: 13px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }
        
        .spin-btn:hover:not(:disabled) {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
        }
        
        .win-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 8px;
            border: 3px solid #ffd700;
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 300px;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.5);
        }
        
        .win-modal.show {
            display: block;
            animation: popIn 0.5s ease-out;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .win-title {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        
        .win-amount {
            font-size: 36px;
            color: #00d4ff;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .close-btn {
            padding: 10px 30px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .close-btn:hover {
            background: #ffed4e;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎰 ROYAL SPIN CASINO</div>
        <div class="balance">Balance: $<span id="balance">5000.00</span></div>
    </div>

    <div class="main-container">
        <div class="left-sidebar" id="gameSelector"></div>
        
        <div class="center-area">
            <div class="game-info">
                <div class="info-item">
                    <span class="info-label">Game:</span>
                    <span class="info-value" id="gameName">Buffalo Gold</span>
                </div>
                <div class="info-item">
                    <span class="info-label">RTP:</span>
                    <span class="info-value" id="rtp">95.5%</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Bet:</span>
                    <span class="info-value">$<span id="betAmount">10.00</span></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status:</span>
                    <span class="info-value" id="status">Ready</span>
                </div>
            </div>
            
            <div id="gameContainer">
                <div class="reels-display" id="reelsDisplay"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" id="betDown">- Bet</button>
        <button class="btn" id="betUp">+ Bet</button>
        <button class="btn spin-btn" id="spinBtn">SPIN</button>
        <button class="btn" id="maxBet">Max Bet</button>
    </div>

    <div class="win-modal" id="winModal">
        <div class="win-title" id="winTitle">🎉 YOU WIN! 🎉</div>
        <div class="win-amount" id="winAmount">+$500.00</div>
        <button class="close-btn" onclick="closeWinModal()">Continue</button>
    </div>

    <script>
        const GAMES = {
            buffalo: { name: 'Buffalo Gold', reels: 3, rtp: 95.5, symbols: ['🦬', '🌾', '⭐', '💎', '🏆'] },
            dragon: { name: 'Dragon Link', reels: 4, rtp: 96.2, symbols: ['🐉', '🔥', '💰', '👑', '🎯'] },
            lightning: { name: 'Lightning Link', reels: 3, rtp: 95.8, symbols: ['⚡', '💛', '🌟', '💎', '🎰'] },
            fortunes: { name: '88 Fortunes', reels: 4, rtp: 96.0, symbols: ['8️⃣', '🧧', '🏮', '🎊', '💰'] },
            wheel: { name: 'Wheel of Fortune', reels: 3, rtp: 94.8, symbols: ['🎡', '💎', '🏆', '⭐', '💰'] },
            drums: { name: 'Dancing Drums', reels: 4, rtp: 95.3, symbols: ['🥁', '🎵', '💃', '🎶', '🌟'] }
        };

        let state = {
            balance: 5000,
            bet: 10,
            minBet: 1,
            maxBet: 1000,
            isSpinning: false,
            currentGame: 'buffalo',
            reelValues: []
        };

        function initGameSelector() {
            const selector = document.getElementById('gameSelector');
            Object.entries(GAMES).forEach(([key, game]) => {
                const btn = document.createElement('button');
                btn.className = 'game-btn' + (key === 'buffalo' ? ' active' : '');
                btn.textContent = game.name;
                btn.dataset.game = key;
                btn.addEventListener('click', () => switchGame(key, btn));
                selector.appendChild(btn);
            });
        }

        function switchGame(gameKey, button) {
            if (state.isSpinning) return;
            
            state.currentGame = gameKey;
            state.bet = 10;
            
            document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            
            updateDisplay();
            renderReels();
        }

        function renderReels() {
            const game = GAMES[state.currentGame];
            const container = document.getElementById('reelsDisplay');
            container.innerHTML = '';
            
            for (let i = 0; i < game.reels; i++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                reel.id = `reel-${i}`;
                
                const symbol = document.createElement('div');
                symbol.className = 'reel-symbol';
                symbol.textContent = game.symbols[Math.floor(Math.random() * game.symbols.length)];
                
                reel.appendChild(symbol);
                container.appendChild(reel);
            }
        }

        function updateDisplay() {
            const game = GAMES[state.currentGame];
            document.getElementById('balance').textContent = state.balance.toFixed(2);
            document.getElementById('gameName').textContent = game.name;
            document.getElementById('rtp').textContent = game.rtp + '%';
            document.getElementById('betAmount').textContent = state.bet.toFixed(2);
        }

        async function spin() {
            if (state.isSpinning || state.balance < state.bet) return;
            
            state.isSpinning = true;
            state.balance -= state.bet;
            document.getElementById('status').textContent = 'Spinning...';
            document.getElementById('spinBtn').disabled = true;
            
            const game = GAMES[state.currentGame];
            const reels = document.querySelectorAll('.reel');
            
            // Add spinning animation
            reels.forEach(reel => reel.classList.add('spinning'));
            
            // Spin duration
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Remove spinning animation
            reels.forEach(reel => reel.classList.remove('spinning'));
            
            // Generate results
            const results = [];
            reels.forEach((reel, index) => {
                const symbol = game.symbols[Math.floor(Math.random() * game.symbols.length)];
                results.push(symbol);
                reel.querySelector('.reel-symbol').textContent = symbol;
            });
            
            // Check win
            const isWin = results.every(s => s === results[0]);
            let winAmount = 0;
            
            if (isWin) {
                winAmount = state.bet * (50 + Math.random() * 100);
                state.balance += winAmount;
                showWinModal(true, winAmount);
            } else {
                showWinModal(false, state.bet);
            }
            
            state.isSpinning = false;
            document.getElementById('status').textContent = 'Ready';
            document.getElementById('spinBtn').disabled = false;
            updateDisplay();
        }

        function showWinModal(isWin, amount) {
            const modal = document.getElementById('winModal');
            if (isWin) {
                document.getElementById('winTitle').textContent = '🎉 YOU WIN! 🎉';
                document.getElementById('winAmount').textContent = '+$' + amount.toFixed(2);
            } else {
                document.getElementById('winTitle').textContent = 'NO MATCH';
                document.getElementById('winAmount').textContent = '-$' + amount.toFixed(2);
            }
            modal.classList.add('show');
        }

        function closeWinModal() {
            document.getElementById('winModal').classList.remove('show');
        }

        // Event listeners
        document.getElementById('spinBtn').addEventListener('click', spin);
        document.getElementById('betUp').addEventListener('click', () => {
            state.bet = Math.min(state.bet + 10, state.maxBet);
            updateDisplay();
        });
        document.getElementById('betDown').addEventListener('click', () => {
            state.bet = Math.max(state.bet - 10, state.minBet);
            updateDisplay();
        });
        document.getElementById('maxBet').addEventListener('click', () => {
            state.bet = Math.min(state.maxBet, state.balance);
            updateDisplay();
        });

        // Initialize
        initGameSelector();
        renderReels();
        updateDisplay();
    </script>
</body>
</html>
