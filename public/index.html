<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Spin Casino - Professional Slot Machines</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Orbitron', 'Arial', sans-serif; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1729 100%); color: #fff; overflow: hidden; height: 100vh; }
        #gameContainer { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .header { padding: 20px 40px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffd700; }
        .logo { font-size: 28px; font-weight: bold; background: linear-gradient(45deg, #ffd700, #ffed4e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .wallet { background: rgba(0, 212, 255, 0.1); padding: 10px 20px; border-radius: 8px; border: 2px solid #00d4ff; backdrop-filter: blur(10px); }
        .balance-label { font-size: 14px; color: #00d4ff; }
        .balance-amount { font-size: 22px; color: #ffd700; font-weight: bold; }
        .game-selector { padding: 20px 40px; background: rgba(0, 0, 0, 0.5); display: flex; gap: 15px; overflow-x: auto; }
        .game-btn { padding: 10px 20px; background: rgba(255, 215, 0, 0.1); border: 2px solid #ffd700; color: #ffd700; border-radius: 6px; cursor: pointer; transition: all 0.3s; font-weight: bold; white-space: nowrap; }
        .game-btn:hover { background: rgba(255, 215, 0, 0.3); transform: scale(1.05); }
        .game-btn.active { background: linear-gradient(45deg, #ffd700, #ffed4e); color: #000; }
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .slot-machine { background: linear-gradient(135deg, #1a1a3e 0%, #2d3561 100%); border: 4px solid #ffd700; border-radius: 20px; padding: 30px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), inset 0 0 30px rgba(255, 215, 0, 0.1); }
        .game-title { text-align: center; font-size: 24px; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .reels-container { display: flex; gap: 15px; margin-bottom: 30px; justify-content: center; }
        .reel { background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%); border: 3px solid #ffd700; border-radius: 10px; padding: 10px; box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 215, 0, 0.2); }
        .reel-symbol { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 5px 0; border-radius: 6px; background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.2); }
        .reel-symbol.active { background: rgba(0, 212, 255, 0.2); border: 2px solid #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
        .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 25px; font-size: 14px; font-weight: bold; border: 2px solid #ffd700; background: linear-gradient(45deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05)); color: #ffd700; border-radius: 8px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover:not(:disabled) { background: linear-gradient(45deg, rgba(255, 215, 0, 0.4), rgba(255, 215, 0, 0.2)); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-spin { padding: 15px 40px; font-size: 16px; background: linear-gradient(45deg, #00d4ff, #0099cc); border-color: #00d4ff; color: #fff; }
        .btn-spin:hover:not(:disabled) { box-shadow: 0 0 30px rgba(0, 212, 255, 0.8); }
        .game-info { display: flex; gap: 30px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .info-item { background: rgba(0, 212, 255, 0.1); padding: 12px 20px; border-radius: 6px; border-left: 3px solid #00d4ff; }
        .info-label { font-size: 12px; color: #aaa; }
        .info-value { font-size: 18px; color: #ffd700; font-weight: bold; }
        .result-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); padding: 40px; border-radius: 12px; border: 3px solid #ffd700; text-align: center; z-index: 1000; display: none; min-width: 400px; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .result-modal.show { display: block; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .result-title { font-size: 36px; color: #ffd700; margin-bottom: 20px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .result-amount { font-size: 48px; color: #00d4ff; margin-bottom: 20px; font-weight: bold; }
        .close-btn { margin-top: 20px; padding: 10px 20px; background: #ffd700; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .close-btn:hover { background: #ffed4e; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="header">
            <div class="logo">🎰 ROYAL SPIN CASINO</div>
            <div class="wallet">
                <div class="balance-label">Balance</div>
                <div class="balance-amount" id="balance">$5,000.00</div>
            </div>
        </div>

        <div class="game-selector">
            <button class="game-btn active" data-game="buffalo">Buffalo Gold (3×5)</button>
            <button class="game-btn" data-game="dragon">Dragon Link (4×5)</button>
            <button class="game-btn" data-game="lightning">Lightning Link (3×5)</button>
            <button class="game-btn" data-game="fortunes">88 Fortunes (4×5)</button>
            <button class="game-btn" data-game="wheel">Wheel of Fortune (3×5)</button>
            <button class="game-btn" data-game="drums">Dancing Drums (4×5)</button>
        </div>

        <div class="game-area">
            <div class="slot-machine">
                <div class="game-title" id="gameTitle">Buffalo Gold</div>
                <div class="reels-container" id="reelsContainer"></div>
                <div class="game-info">
                    <div class="info-item">
                        <div class="info-label">RTP</div>
                        <div class="info-value" id="rtp">95.5%</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Bet</div>
                        <div class="info-value" id="bet">$10.00</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Status</div>
                        <div class="info-value" id="status">Ready</div>
                    </div>
                </div>
                <div class="controls" style="margin-top: 30px;">
                    <button class="btn" id="betDown">- Bet</button>
                    <button class="btn" id="betUp">+ Bet</button>
                    <button class="btn btn-spin" id="spinBtn">SPIN</button>
                    <button class="btn" id="maxBet">Max Bet</button>
                </div>
            </div>
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-title" id="resultTitle">YOU WIN!</div>
        <div class="result-amount" id="resultAmount">+$500</div>
        <button class="close-btn" onclick="closeResult()">Continue</button>
    </div>

    <script>
        const games = {
            buffalo: {
                name: 'Buffalo Gold',
                reels: 3,
                rows: 5,
                rtp: 95.5,
                symbols: ['🦬', '🌾', '⭐', '💎', '🏆'],
                color: '#8B7500'
            },
            dragon: {
                name: 'Dragon Link',
                reels: 4,
                rows: 5,
                rtp: 96.2,
                symbols: ['🐉', '🔥', '💰', '👑', '🎯'],
                color: '#FF6B00'
            },
            lightning: {
                name: 'Lightning Link',
                reels: 3,
                rows: 5,
                rtp: 95.8,
                symbols: ['⚡', '💛', '🌟', '💎', '🎰'],
                color: '#00FFFF'
            },
            fortunes: {
                name: '88 Fortunes',
                reels: 4,
                rows: 5,
                rtp: 96.0,
                symbols: ['8️⃣', '🧧', '🏮', '🎊', '💰'],
                color: '#FF1493'
            },
            wheel: {
                name: 'Wheel of Fortune',
                reels: 3,
                rows: 5,
                rtp: 94.8,
                symbols: ['🎡', '💎', '🏆', '⭐', '💰'],
                color: '#FFD700'
            },
            drums: {
                name: 'Dancing Drums',
                reels: 4,
                rows: 5,
                rtp: 95.3,
                symbols: ['🥁', '🎵', '💃', '🎶', '🌟'],
                color: '#FF00FF'
            }
        };

        let gameState = {
            balance: 5000,
            currentBet: 10,
            minBet: 1,
            maxBet: 1000,
            isSpinning: false,
            currentGame: 'buffalo'
        };

        function getRandomSymbol(game) {
            return games[game].symbols[Math.floor(Math.random() * games[game].symbols.length)];
        }

        function renderReels() {
            const game = games[gameState.currentGame];
            const container = document.getElementById('reelsContainer');
            container.innerHTML = '';

            for (let r = 0; r < game.reels; r++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                reel.id = `reel-${r}`;

                for (let row = 0; row < game.rows; row++) {
                    const symbol = document.createElement('div');
                    symbol.className = 'reel-symbol';
                    symbol.id = `symbol-${r}-${row}`;
                    if (row === Math.floor(game.rows / 2)) {
                        symbol.classList.add('active');
                        symbol.textContent = getRandomSymbol(gameState.currentGame);
                    } else {
                        symbol.textContent = getRandomSymbol(gameState.currentGame);
                    }
                    reel.appendChild(symbol);
                }
                container.appendChild(reel);
            }
        }

        function updateUI() {
            const game = games[gameState.currentGame];
            document.getElementById('gameTitle').textContent = game.name;
            document.getElementById('rtp').textContent = game.rtp + '%';
            document.getElementById('bet').textContent = '$' + gameState.currentBet.toFixed(2);
            document.getElementById('balance').textContent = '$' + gameState.balance.toFixed(2);
        }

        async function spin() {
            if (gameState.isSpinning || gameState.balance < gameState.currentBet) return;

            gameState.isSpinning = true;
            gameState.balance -= gameState.currentBet;
            document.getElementById('status').textContent = 'Spinning...';
            document.getElementById('spinBtn').disabled = true;

            const game = games[gameState.currentGame];
            const spinDuration = 1.5;

            // Animate all reels
            for (let r = 0; r < game.reels; r++) {
                const reel = document.getElementById(`reel-${r}`);
                for (let row = 0; row < game.rows; row++) {
                    const symbol = document.getElementById(`symbol-${r}-${row}`);
                    symbol.style.transition = `transform ${spinDuration}s cubic-bezier(0.25, 0.46, 0.45, 0.94)`;
                    symbol.style.transform = `translateY(${-300 * (Math.random() * 10 + 5)}px)`;
                }
            }

            await new Promise(resolve => setTimeout(resolve, spinDuration * 1000));

            // Generate results
            const results = [];
            for (let r = 0; r < game.reels; r++) {
                const symbol = getRandomSymbol(gameState.currentGame);
                results.push(symbol);

                // Update middle symbol
                const middleSymbol = document.getElementById(`symbol-${r}-${Math.floor(game.rows / 2)}`);
                middleSymbol.style.transition = 'none';
                middleSymbol.style.transform = 'translateY(0)';
                middleSymbol.textContent = symbol;
            }

            // Check for win (all reels match)
            const isWin = results.every(s => s === results[0]);
            let winAmount = 0;

            if (isWin) {
                winAmount = gameState.currentBet * (50 + Math.random() * 100);
                gameState.balance += winAmount;
                showResult(true, winAmount);
            } else {
                showResult(false, 0);
            }

            gameState.isSpinning = false;
            document.getElementById('status').textContent = 'Ready';
            document.getElementById('spinBtn').disabled = false;
            updateUI();
        }

        function showResult(isWin, amount) {
            const modal = document.getElementById('resultModal');
            document.getElementById('resultTitle').textContent = isWin ? '🎉 YOU WIN! 🎉' : 'NO MATCH';
            document.getElementById('resultAmount').textContent = isWin ? '+$' + amount.toFixed(2) : '-$' + gameState.currentBet.toFixed(2);
            modal.classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
        }

        // Event listeners
        document.querySelectorAll('.game-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (gameState.isSpinning) return;
                document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                gameState.currentGame = e.target.dataset.game;
                gameState.currentBet = 10;
                renderReels();
                updateUI();
            });
        });

        document.getElementById('spinBtn').addEventListener('click', spin);
        document.getElementById('betUp').addEventListener('click', () => {
            gameState.currentBet = Math.min(gameState.currentBet + 10, gameState.maxBet);
            updateUI();
        });
        document.getElementById('betDown').addEventListener('click', () => {
            gameState.currentBet = Math.max(gameState.currentBet - 10, gameState.minBet);
            updateUI();
        });
        document.getElementById('maxBet').addEventListener('click', () => {
            gameState.currentBet = Math.min(gameState.maxBet, gameState.balance);
            updateUI();
        });

        // Initialize
        renderReels();
        updateUI();
    </script>
</body>
</html>
